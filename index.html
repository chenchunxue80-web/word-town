<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Smart English 快乐启蒙</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Nunito','PingFang SC','Microsoft YaHei',sans-serif;
  background:linear-gradient(180deg,#e3f2fd 0%,#bbdefb 40%,#90caf9 80%);
  min-height:100vh;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
}
.bubbles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.bubble{position:absolute;border-radius:50%;opacity:0.3;animation:floatB 8s infinite ease-in-out;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(135,206,250,0.4))}
.bubble:nth-child(1){width:60px;height:60px;left:10%;animation-delay:0s}
.bubble:nth-child(2){width:40px;height:40px;left:25%;animation-delay:2s}
.bubble:nth-child(3){width:80px;height:80px;left:45%;animation-delay:4s}
.bubble:nth-child(4){width:35px;height:35px;left:65%;animation-delay:1s}
.bubble:nth-child(5){width:55px;height:55px;left:80%;animation-delay:3s}
.bubble:nth-child(6){width:45px;height:45px;left:90%;animation-delay:5s}
@keyframes floatB{0%,100%{transform:translateY(100vh) scale(0.3);opacity:0}20%{opacity:0.3}50%{opacity:0.2}80%{opacity:0.3}100%{transform:translateY(-100px) scale(1.2);opacity:0}}

.main{max-width:800px;margin:0 auto;padding:15px;position:relative;z-index:1}
h1{text-align:center;color:#fff;font-size:1.8em;font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,0.1);margin-bottom:4px}
.sub{text-align:center;color:rgba(255,255,255,0.9);font-size:0.95em;font-weight:700;margin-bottom:12px}

/* 导航 */
nav{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
nav button{padding:8px 13px;border:2px solid rgba(255,255,255,0.5);border-radius:20px;background:rgba(255,255,255,0.2);color:#fff;font-size:0.85em;cursor:pointer;transition:all 0.2s;font-weight:700}
nav button:hover{background:rgba(255,255,255,0.35);transform:translateY(-2px)}
nav button.on{background:#fff;color:#2979ff;border-color:#fff;box-shadow:0 3px 12px rgba(0,0,0,0.1)}

/* 游戏面板 */
.panel{background:rgba(255,255,255,0.93);border-radius:24px;padding:22px 18px;min-height:380px;box-shadow:0 8px 30px rgba(0,0,0,0.08)}

.score{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;padding-bottom:10px;border-bottom:2px dashed #e3f2fd}
.score div{text-align:center;font-size:0.75em;color:#999;font-weight:700}
.score div span{display:block;font-size:1.6em;font-weight:900;color:#2979ff}

/* 闪卡 */
.fc{display:flex;flex-direction:column;align-items:center;gap:16px}
.card{width:250px;height:180px;perspective:1000px;cursor:pointer}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.6s}
.card.flip .card-inner{transform:rotateY(180deg)}
.cf,.cb{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.6em;font-weight:900;box-shadow:0 6px 20px rgba(0,0,0,0.08)}
.cf{background:linear-gradient(135deg,#e0f7fa,#b2ebf2);color:#2c5fa1}
.cf em{font-size:2.4em;font-style:normal;margin-bottom:8px}
.cb{background:linear-gradient(135deg,#e3f2fd,#bbdefb);color:#1565c0;transform:rotateY(180deg)}
.cb em{font-size:1.8em;font-style:normal;margin-bottom:4px}
.cb small{font-size:0.5em;color:#999}
.nv{display:flex;gap:20px;align-items:center}
.nv button{width:44px;height:44px;border-radius:50%;border:none;background:#2979ff;color:#fff;font-size:1.3em;cursor:pointer;transition:all 0.2s}
.nv button:hover{transform:scale(1.1)}
.nv span{font-weight:700;color:#999;min-width:50px;text-align:center}

/* 按钮 */
.btn{padding:12px 26px;border:none;border-radius:22px;font-size:1em;cursor:pointer;transition:all 0.2s;font-weight:700}
.btn-say{background:linear-gradient(135deg,#ffe066,#f6e58d);color:#d63031}
.btn-say:hover{transform:scale(1.05);box-shadow:0 4px 12px rgba(255,224,102,0.4)}
.btn-go{background:linear-gradient(135deg,#2979ff,#2196f3);color:#fff}
.btn-go:hover{transform:scale(1.05)}
.btn:active{transform:scale(0.92)}

/* 选择题 */
.qz{text-align:center}
.qz .qen{font-size:2.5em;font-weight:900;color:#2979ff;margin:12px 0}
.qz .qem{font-size:3em;display:block;margin-bottom:6px}
.qz .qpro{color:#bbb;margin-bottom:6px;font-size:0.85em;font-weight:700}
.qz .qopts{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:460px;margin:0 auto}
.qz .qopts div{padding:14px;border:3px solid #e8e8e8;border-radius:16px;background:#fff;font-size:1.1em;cursor:pointer;transition:all 0.2s;font-weight:700;text-align:center}
.qz .qopts div:hover{border-color:#2979ff;background:#f5f8ff;transform:scale(1.03)}
.qz .qopts div.ok{border-color:#00b894;background:#e6fff5;color:#00b894}
.qz .qopts div.ng{border-color:#ff6b6b;background:#fff5f5;color:#ff6b6b}

/* 连连看 */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:550px;margin:0 auto}
.mg .mc{display:flex;flex-direction:column;gap:5px}
.mg .mc div{padding:11px 8px;border:3px solid #e8e8e8;border-radius:14px;text-align:center;cursor:pointer;transition:all 0.2s;font-weight:700;background:#fff;font-size:0.95em}
.mg .mc div:hover{border-color:#2979ff;background:#f5f8ff}
.mg .mc div.sel{border-color:#ffd700;background:#fffde7;box-shadow:0 0 10px rgba(255,215,0,0.4)}
.mg .mc div.done{border-color:#00b894;background:#e6fff5;opacity:0.5;pointer-events:none}
.mg .mc div.err{animation:shake 0.5s;border-color:#ff6b6b}

/* 对话 */
.dcard{background:#fff;border-radius:20px;padding:18px;margin:10px 0;box-shadow:0 3px 12px rgba(0,0,0,0.05);text-align:center}
.dcard .dxh{font-size:1em;color:#999;font-weight:700;margin-bottom:6px}
.dcard .dxen{font-size:1.5em;font-weight:900;color:#2d3436;margin-top:4px}
.dtag{display:inline-block;padding:5px 16px;border-radius:16px;font-weight:700;font-size:0.85em;margin-bottom:10px}
.dtag.q{background:#e3f2fd;color:#2979ff}
.dtag.a{background:#e8f5e9;color:#2e7d32}
.dstep{text-align:center;color:#aaa;font-size:0.85em;font-weight:700;margin-bottom:6px}

/* 动画 */
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}
@keyframes pop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-70px);opacity:0}}
.pop{animation:pop 0.5s}
.fpt{position:absolute;color:#ffd700;font-weight:900;font-size:1.4em;pointer-events:none;animation:floatUp 1s forwards;z-index:50}
.cfx{position:fixed;width:12px;height:12px;border-radius:3px;pointer-events:none;animation:cfFall 2.5s forwards;z-index:300}
@keyframes cfFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(1080deg);opacity:0}}

.stars{font-size:2.5em;margin:8px 0}
.big-e{font-size:4em}
.result{text-align:center;padding:20px}
.result h3{color:#2979ff;font-size:1.3em;margin:8px 0}
.result p{color:#aaa;margin-bottom:12px}

/* 吉祥物 */
.pet{position:fixed;bottom:12px;right:12px;font-size:3em;cursor:pointer;z-index:100;animation:petB 1.5s infinite}
@keyframes petB{0%,100%{transform:translateY(0)}30%{transform:translateY(-12px)}50%{transform:translateY(0)}}
.pet:active{transform:scale(1.3)}
.pet-msg{position:fixed;bottom:80px;right:8px;background:#fff;color:#2979ff;padding:8px 14px;border-radius:16px 16px 4px 16px;font-weight:700;font-size:0.9em;z-index:100;box-shadow:0 3px 12px rgba(0,0,0,0.12);display:none}

@media(max-width:500px){
  .qz .qopts{grid-template-columns:1fr}
  .card{width:210px;height:155px}
  .cf,.cb{font-size:1.3em}
  nav button{padding:7px 10px;font-size:0.78em}
}
</style>

// ===== 状态 =====
let book='starter',mode='flashcard',unit=null;
let words=[],score=0,total=0,combo=0;

let _voice=null;
function speak(t){
  if(!('speechSynthesis' in window))return;
  // 首次或语音列表变化时，选一个好听的英文女声
  if(!_voice||speechSynthesis.getVoices().length>0){
    const voices=speechSynthesis.getVoices();
    // 优先选 Samantha（macOS 女声）、Google US English、或任意英文女声
    const preferred=['Samantha','Karen','Google US English','Microsoft Zira','Fiona','Veena','Moira','Tessa'];
    for(const name of preferred){
      const v=voices.find(x=>x.name.includes(name));if(v){_voice=v;break;}
    }
    // 其次选任意英文女声
    if(!_voice)_voice=voices.find(v=>v.lang.startsWith('en')&&v.name.includes('Female'));
    // 再不济选任意英文
    if(!_voice)_voice=voices.find(v=>v.lang.startsWith('en'));
  }
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang='en-US';u.rate=0.9;u.pitch=1.1;
  if(_voice)u.voice=_voice;
  speechSynthesis.speak(u);
}
// 预加载语音列表（Chrome需要异步获取）
if('speechSynthesis' in window)speechSynthesis.getVoices();

// ===== 导航 =====
function buildNav(){
  const bn=document.getElementById('bookNav'),mn=document.getElementById('modeNav'),un=document.getElementById('unitNav');
  bn.innerHTML='';mn.innerHTML='';un.innerHTML='';
  [['starter','🌰','Starter'],['1','🌱','1册'],['2','🌿','2册'],['3','🌳','3册'],['4','🌲','4册'],['5','🌴','5册'],['6','🌵','6册']].forEach(([k,e,n])=>{
    const b=document.createElement('button');b.textContent=e+' '+n;b.className=k==book?'on':'';b.onclick=()=>{book=k;unit=Object.keys(WB[k].u)[0];score=total=combo=0;buildNav();run();};bn.appendChild(b);
  });
  [['flashcard','📇 闪卡'],['quiz','✅ 选择'],['match','🔗 连连看'],['dialogue','💬 对话']].forEach(([id,label])=>{
    const b=document.createElement('button');b.textContent=label;b.className=id==mode?'on':'';b.onclick=()=>{mode=id;buildNav();run();};mn.appendChild(b);
  });
  Object.keys(WB[book].u).forEach((u,i)=>{
    const b=document.createElement('button');b.textContent=(i+1)+'.'+u;b.className=u==unit?'on':'';b.onclick=()=>{unit=u;score=total=combo=0;buildNav();run();};un.appendChild(b);
  });
}

// ===== 启动 =====
function run(){
  words=WB[book].u[unit].w;
  if(mode==='flashcard')startFC();
  else if(mode==='quiz')startQuiz();
  else if(mode==='match')startMatch();
  else startDia();
}

// ===== 得分栏 =====
function sb(extra=''){
  return `<div class="score"><div><span>${score}</span>⭐得分</div><div><span>${combo>2?'🔥'+combo+'连击!':''}</span></div><div><span>${total}</span>📝已答</div><div><span>${words.length}</span>📚单词</div>${extra}</div>`;
}

// ===== 闪卡 =====
let fci=0;
function startFC(){fci=0;renderFC();}
function renderFC(){
  const w=words[fci];
  document.getElementById('game').innerHTML=sb(`<div><span>${fci+1}/${words.length}</span>📇进度</div>`)+
  `<div class="fc pop"><div class="card" id="cd" onclick="this.classList.toggle('flip')"><div class="card-inner"><div class="cf"><em>${w.em}</em>${w.en}</div><div class="cb"><em>${w.em}</em>${w.zh}<small>${w.en}</small></div></div></div>
  <div class="nv"><button onclick="prevFC(event)">◀</button><span>${fci+1}/${words.length}</span><button onclick="nextFC(event)">▶</button></div>
  <button class="btn btn-say" onclick="speak('${w.en.replace(/'/g,"\\'")}')">🔊 听发音</button></div>`;
}
function nextFC(e){e.stopPropagation();if(fci<words.length-1){fci++;renderFC();}}
function prevFC(e){e.stopPropagation();if(fci>0){fci--;renderFC();}}

// ===== 选择题 =====
let qi=0,qw=[];
function startQuiz(){qw=[...words].sort(()=>Math.random()-0.5).slice(0,10);qi=0;combo=0;renderQuiz();}
function renderQuiz(){
  if(qi>=qw.length)return showResult();
  const w=qw[qi],ok=w.zh;
  let opts=words.filter(x=>x.zh!==ok).sort(()=>Math.random()-0.5).slice(0,3).map(x=>x.zh);
  while(opts.length<3)opts.push('---');
  opts=[...opts,ok].sort(()=>Math.random()-0.5);
  document.getElementById('game').innerHTML=sb(`<div><span>${qi+1}/${qw.length}</span>📝题目</div>`)+
  `<div class="qz pop"><div class="qpro">第${qi+1}/${qw.length}题</div><span class="qem">${w.em}</span><div class="qen">${w.en}</div>
  <button class="btn btn-say" onclick="speak('${w.en.replace(/'/g,"\\'")}')" style="margin-bottom:10px">🔊 听发音</button>
  <div class="qopts">${opts.map(o=>`<div onclick="checkQ(this,'${o.replace(/'/g,"\\'")}','${ok.replace(/'/g,"\\'")}')">${o}</div>`).join('')}</div></div>`;
  setTimeout(()=>speak(w.en),300);
}
function checkQ(el,a,ok){
  document.querySelectorAll('.qopts div').forEach(o=>o.style.pointerEvents='none');
  if(a===ok){el.classList.add('ok');score+=10;combo++;spawnConfetti(5);showFloat('+10',el);if(combo===3)showPet('连对3题！太厉害了！🌟');if(combo===5){showPet('连对5题！你是天才！🎉');spawnConfetti(20);}}
  else{el.classList.add('ng');combo=0;document.querySelectorAll('.qopts div').forEach(o=>{if(o.textContent===ok)o.classList.add('ok');});}
  total++;setTimeout(()=>{qi++;renderQuiz();},1000);
}
function showResult(){
  const max=Math.min(10,words.length)*10,ratio=score/max;
  let stars,emoji;if(ratio>=0.9){stars='⭐⭐⭐⭐⭐';emoji='🏆';}else if(ratio>=0.7){stars='⭐⭐⭐⭐';emoji='😄';}else if(ratio>=0.5){stars='⭐⭐⭐';emoji='🙂';}else{stars='⭐⭐';emoji='💪';}
  document.getElementById('game').innerHTML=sb()+`<div class="result pop"><div class="big-e">${emoji}</div><div class="stars">${stars}</div><h3>得分: ${score}/${max}</h3><p>正确率: ${Math.round(ratio*100)}%</p><button class="btn btn-go" onclick="startQuiz()">🔄 再来一次</button></div>`;
  if(ratio>=0.7)spawnConfetti(20);
}

// ===== 连连看 =====
let mp=[],ms=null,mt=0,mi=null,md=0;
function startMatch(){mp=[...words].sort(()=>Math.random()-0.5).slice(0,8);ms=null;md=0;mt=0;combo=0;if(mi)clearInterval(mi);mi=setInterval(()=>{mt++;const e=document.getElementById('mtimer');if(e)e.textContent='⏱️ '+mt+'秒';},1000);renderMatch();}
function renderMatch(){
  const en=mp.map(w=>({...w,s:'en'})).sort(()=>Math.random()-0.5);
  const zh=mp.map(w=>({...w,s:'zh'})).sort(()=>Math.random()-0.5);
  document.getElementById('game').innerHTML=sb(`<div><span id="mtimer">⏱️ 0秒</span>⏱️时间</div>`)+
  `<div style="text-align:center;color:#aaa;font-size:0.85em;margin-bottom:6px;font-weight:700">点英文 → 点中文 → 配对！</div>
  <div class="mg pop"><div class="mc">${en.map(w=>`<div data-k="${w.en}" onclick="selM(this,'en','${w.en.replace(/'/g,"\\'")}')">${w.em} ${w.en}</div>`).join('')}</div>
  <div class="mc">${zh.map(w=>`<div data-k="${w.en}" onclick="selM(this,'zh','${w.en.replace(/'/g,"\\'")}')">${w.zh}</div>`).join('')}</div></div>`;
}
function selM(el,s,k){
  if(el.classList.contains('done'))return;
  if(s==='en'){document.querySelectorAll('.mc div.sel').forEach(i=>i.classList.remove('sel'));el.classList.add('sel');ms={el,k};}
  else if(s==='zh'&&ms){
    if(ms.k===k){ms.el.classList.add('done');el.classList.add('done');score+=10;total++;combo++;md++;showFloat('+10',el);if(combo===3)showPet('连对3题！');if(combo===5){showPet('连对5题！天才！🎉');spawnConfetti(20);}ms=null;document.querySelectorAll('.mc div.sel').forEach(i=>i.classList.remove('sel'));if(md>=mp.length){clearInterval(mi);setTimeout(()=>{document.getElementById('game').innerHTML=sb()+`<div class="result pop"><div class="big-e">⚡</div><div class="stars">⭐⭐⭐⭐⭐</div><h3>用时: ${mt}秒!</h3><button class="btn btn-go" onclick="startMatch()">🔄 再来一次</button></div>`;if(mt<30)spawnConfetti(15);},500);}}
    else{el.classList.add('err');ms.el.classList.add('err');combo=0;const p=ms;ms=null;document.querySelectorAll('.mc div.sel').forEach(i=>i.classList.remove('sel'));setTimeout(()=>{el.classList.remove('err');p.el.classList.remove('err');},500);}
  }
}

  else if(/节日/.test(n)) T=[['What is today?','今天是什么日子？','Today is ___.','今天是___。'],['Happy ___!','____快乐！','Thank you!','谢谢你！'],['Do you like ___?','你喜欢___吗？','Yes! I love ___!','喜欢！我爱___！']];

  else if(/科技/.test(n)) T=[['What is this?','这是什么？','It is a ___.','这是一个___。'],['Do you have a ___?','你有___吗？','Yes, I have a ___.','是的，我有一个___。'],['Can you use a ___?','你会用___吗？','Yes! I can use it!','会！我会用！']];
  else if(/音乐|乐器/.test(n)) T=[['Can you play the ___?','你会演奏___吗？','Yes, I can!','是的！我会！'],['What instrument is this?','这是什么乐器？','It is a ___.','这是___。'],['Do you like the ___?','你喜欢___吗？','Yes! I love music!','喜欢！我爱音乐！']];
  else if(/购物/.test(n)) T=[['What do you want?','你想要什么？','I want ___.','我想要___。'],['Can you buy ___?','你能买___吗？','OK! I will buy ___.','好的！我买___。'],['How much?','多少钱？','It is ___.','它很___。']];

  else if(/发明/.test(n)) T=[['What is this?','这是什么？','It is a ___.','这是___。'],['Who made the ___?','谁发明了___？','People made it.','人们发明的。'],['Do you like the ___?','你喜欢___吗？','Yes! It is cool!','喜欢！很酷！']];

  return w.slice(0,3).map((x,i)=>{
    const q=T[i][0].includes('___')?T[i][0].replace('___',x.en):T[i][0];
    const qa=T[i][1].includes('___')?T[i][1].replace('___',x.zh):T[i][1];
    const a=T[i][2].replace(/___/g,x.en);

}
function renderDia(){
  if(di>=dItems.length)return showDResult();
  const it=dItems[di];
  if(dIsQA){
    const isQ=(dp==='q'),en=isQ?it.q:it.a,zh=isQ?it.qa:it.aa;
    document.getElementById('game').innerHTML=sb(`<div><span>${di+1}/${dItems.length}</span>💬对话</div>`)+
    `<div class="pop"><div class="dstep">${isQ?'步骤 1/2：听提问，跟读提问':'步骤 2/2：听回答，跟读回答'}</div>
    <div class="dtag ${isQ?'q':'a'}">${isQ?'提问 Listen':'回答 Answer'}</div>
    <div class="dcard"><div style="font-size:2.5em">${isQ?'🤔':'💡'}</div><div class="dxh">${zh}</div><div class="dxen">${en}</div></div>
    <div style="display:flex;gap:10px;justify-content:center;margin:10px 0"><button class="btn btn-say" onclick="replayD()">🔊 再听</button><button class="btn btn-go" id="dBtn" onclick="doRepeat()">🎤 ${isQ?'跟读提问':'跟读回答'}</button></div>
    <div style="text-align:center;font-weight:700;color:#00b894;min-height:30px" id="dCele"></div></div>`;
    setTimeout(()=>speak(en),400);
  }else{
    document.getElementById('game').innerHTML=sb(`<div><span>${di+1}/${dItems.length}</span>💬跟读</div>`)+
    `<div class="pop"><div class="dtag a">📖 跟读句子</div>
    <div class="dcard"><div style="font-size:2.5em">🗣️</div><div class="dxh">${it.aa}</div><div class="dxen">${it.a}</div></div>
    <div style="display:flex;gap:10px;justify-content:center;margin:10px 0"><button class="btn btn-say" onclick="replayD()">🔊 再听</button><button class="btn btn-go" id="dBtn" onclick="doSimple()">🎤 我跟读</button></div>
    <div style="text-align:center;font-weight:700;color:#00b894;min-height:30px" id="dCele"></div></div>`;
    setTimeout(()=>speak(it.a),400);
  }
}
function replayD(){const it=dItems[di];speak(dIsQA?(dp==='q'?it.q:it.a):it.a);}
function doSimple(){
  const b=document.getElementById('dBtn'),c=document.getElementById('dCele');b.disabled=true;b.textContent='✅ 完成！';
  c.textContent='🌟 太棒了！读得真好！';speak(dItems[di].a);score+=5;total++;combo++;
  setTimeout(()=>{di++;b.disabled=false;b.textContent='🎤 我跟读';renderDia();},1500);
}
function doRepeat(){
  const b=document.getElementById('dBtn'),c=document.getElementById('dCele'),en=dp==='q'?dItems[di].q:dItems[di].a;
  b.disabled=true;b.textContent='✅ 完成！';c.textContent='🌟 太棒了！读得真好！';speak(en);score+=5;total++;
  if(dp==='q'){dp='a';setTimeout(()=>{b.disabled=false;renderDia();},1500);}
  else{dp='q';di++;combo++;setTimeout(()=>{b.disabled=false;renderDia();},1800);}
}
function showDResult(){
  const max=dItems.length*10,ratio=score/max;
  let stars,emoji;if(ratio>=0.9){stars='⭐⭐⭐⭐⭐';emoji='🏆';}else if(ratio>=0.7){stars='⭐⭐⭐⭐';emoji='😄';}else if(ratio>=0.5){stars='⭐⭐⭐';emoji='🙂';}else{stars='⭐⭐';emoji='💪';}
  document.getElementById('game').innerHTML=sb()+`<div class="result pop"><div class="big-e">${emoji}</div><div class="stars">${stars}</div><h3>得分: ${score}/${max}</h3><p>完成${dItems.length}句</p><button class="btn btn-go" onclick="startDia()">🔄 再来一次</button></div>`;
  if(ratio>=0.7)spawnConfetti(20);
}

// ===== 特效 =====
function showFloat(t,el){const r=el.getBoundingClientRect(),fp=document.createElement('div');fp.className='fpt';fp.textContent=t;fp.style.left=r.left+r.width/2-15+'px';fp.style.top=r.top+'px';document.body.appendChild(fp);setTimeout(()=>fp.remove(),900);}
function spawnConfetti(n){const cs=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#845ef7','#ff6eb4','#20c997'];for(let i=0;i<n;i++){setTimeout(()=>{const p=document.createElement('div');p.className='cfx';p.style.left=Math.random()*85+5+'%';p.style.top='-20px';p.style.background=cs[Math.floor(Math.random()*cs.length)];p.style.width=(8+Math.random()*14)+'px';p.style.height=(8+Math.random()*14)+'px';document.body.appendChild(p);setTimeout(()=>p.remove(),3000);},i*50);}}
function showPet(msg){const m=document.getElementById('petMsg');m.textContent=msg;m.style.display='block';setTimeout(()=>m.style.display='none',2500);}

// ===== 键盘 =====
document.addEventListener('keydown',e=>{
  if(mode==='flashcard'){if(e.key==='ArrowLeft'){e.preventDefault();prevFC(e);}if(e.key==='ArrowRight'){e.preventDefault();nextFC(e);}if(e.key===' '){{e.preventDefault();try{document.getElementById('cd').classList.toggle('flip');}catch(e){}}}}
});
